server:
  port: 10102
  context-path: /user-service
spring:
  application:
    name: paas-user-service
  redis:
    #单机配置信息
    #    host: 175.178.25.239
    #    port: 6379
    password: 123456ABC@
    #哨兵配置访问信息
    sentinel:
      master: mymaster
      nodes: 175.178.25.239:26379,175.178.25.239:26380,175.178.25.239:26381
  #数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/paas_user?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

#配置plus打印sql日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
#设置日志级别,ERROR/WARN/INFO/DEBUG,默认是INFO以上才显示
logging:
  level:
    root: INFO
# swagger3 配置开关
swagger:
  iconfig: true
